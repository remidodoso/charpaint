<!DOCTYPE html>
<!-- build: 0528:1552 -->
<!--
  charpaint — structural shell and styles only.
  All DOM construction, event handling, and application logic lives in src/lib.rs
  (compiled to WebAssembly). This file is intentionally kept minimal.
-->
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>charpaint</title>
  <style>
    /* ── Reset ────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme variables ──────────────────────────────────────────────────── */
    /* Switched by toggling data-theme on <html>; Rust does the toggle.       */

    :root[data-theme="dark"] {
      --bg:          #1e1e1e;
      --chrome:      #2d2d2d;  /* toolbar, menu bar, palette background */
      --border:      #444;
      --text:        #d4d4d4;
      --text-dim:    #888;
      --canvas-bg:   #0d0d0d;  /* the character grid background */
      --canvas-fg:   #cccccc;  /* default character colour */
      --hover-bg:    #1a2e1a;  /* cell hover tint */
      --accent:      #4ec9b0;  /* active tool/palette highlight */
      --select-tint: rgba(0, 160, 155, 0.28); /* selection fill — dim desaturated cyan */
    }

    :root[data-theme="light"] {
      --bg:          #e8e8e8;
      --chrome:      #d0d0d0;
      --border:      #aaa;
      --text:        #1e1e1e;
      --text-dim:    #555;
      --canvas-bg:   #ffffff;
      --canvas-fg:   #1e1e1e;
      --hover-bg:    #d0ecd0;
      --accent:      #007a6e;
      --select-tint: rgba(0, 120, 115, 0.20); /* slightly darker for visibility on white */
    }

    /* ── Page layout ──────────────────────────────────────────────────────── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: sans-serif;
      height: 100svh; /* svh = small viewport height: stable size regardless of browser chrome visibility */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Menu bar ─────────────────────────────────────────────────────────── */
    #menubar {
      background: var(--chrome);
      border-bottom: 1px solid var(--border);
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      user-select: none;
      flex-shrink: 0;
    }
    #menubar .brand {
      font-weight: bold;
      color: var(--accent);
      padding: 2px 8px 2px 0;
      margin-right: 4px;
      border-right: 1px solid var(--border);
    }
    #menubar .menu-item {
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 3px;
    }
    #menubar .menu-item:hover { background: var(--border); }
    #menubar .spacer { flex: 1; }

    /* Undo / redo action buttons — styled as plain icon buttons, not text labels */
    #menubar .menu-action {
      cursor: pointer;
      padding: 2px 7px;
      border-radius: 3px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }
    #menubar .menu-action:hover { background: var(--border); }

    /* Flash state: applied briefly when a keyboard shortcut fires, so the user
       can see which button corresponds to the key they pressed — classic Mac behaviour. */
    #menubar .menu-action.flash {
      background: var(--accent);
      color: #000;
    }

    /* Error flash: applied briefly when an action fails (e.g. clipboard denied). */
    #menubar .menu-action.flash-error {
      background: #c0392b;
      color: #fff;
    }

    /* Thin vertical rule separating undo/redo from the File menu group */
    #menubar .menu-sep {
      width: 1px;
      height: 16px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* Theme toggle — label text ("☀ Light" / "☾ Dark") is set by Rust */
    #theme-toggle {
      cursor: pointer;
      padding: 2px 10px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 12px;
      line-height: 1.6;
    }
    #theme-toggle:hover { background: var(--border); }

    /* ── Main area (toolbar + canvas) ────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Toolbar ──────────────────────────────────────────────────────────── */
    /* Static structure defined in HTML; click handlers wired by Rust.        */
    #toolbar {
      background: var(--chrome);
      border-right: 1px solid var(--border);
      width: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      gap: 2px;
      flex-shrink: 0;
      user-select: none;
      position: relative;
    }
    .tool-row { display: flex; gap: 2px; }

    /* Individual tool button */
    .tool {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
      border: 1px solid transparent;
      color: var(--text);
    }
    .tool:hover { background: var(--border); }
    .tool.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* Horizontal divider between tool groups */
    .tool-sep {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* Empty placeholder slot — visual sibling to the mode button, non-interactive */
    .tool-empty {
      width: 24px;
      height: 24px;
      border-radius: 3px;
      border: 1px dashed var(--border);
      opacity: 0.25;
      pointer-events: none;
    }

    /* ── Canvas area ──────────────────────────────────────────────────────── */
    #canvas-wrap {
      flex: 1;
      display: flex;
      flex-direction: column; /* grid on top, build-info label below */
      align-items: flex-start;
      justify-content: flex-start;
      overflow: auto;
      padding: 16px;
      background: var(--bg);
    }

    /* Build timestamp — small dimmed label below the grid, set by Rust at startup */
    #build-info {
      font-family: monospace;
      font-size: 11px;
      color: var(--text-dim);
      padding: 6px 0 0 1px; /* a little breathing room below the grid border */
      user-select: none;
      flex-shrink: 0;
    }

    /* ── Character grid ───────────────────────────────────────────────────── */
    /* Cell <span> elements are created by Rust; layout is pure CSS.          */
    /* grid-template-columns uses `ch` units so column width tracks the font. */
    #grid {
      display: grid;
      grid-template-columns: repeat(80, 1ch);
      grid-auto-rows: 1.25em;
      font-family: monospace;      /* system default monospace — TBD: user font picker */
      font-size: 16px;
      line-height: 1.25;
      background: var(--canvas-bg);
      color: var(--canvas-fg);
      border: 1px solid var(--border);
      cursor: crosshair;
      user-select: none;
      touch-action: none; /* hand all touch events to JS; prevents browser scroll/zoom on the canvas */
      flex-shrink: 0;
    }

    /* Individual character cell */
    .cell {
      display: block;
      overflow: hidden;
      white-space: pre; /* preserve spaces; do not collapse or wrap */
    }
    .cell:hover  { background: var(--hover-bg); }

    /* Preview state: cell is part of an in-progress tool operation */
    .cell.preview {
      background: color-mix(in srgb, var(--accent) 25%, transparent);
      color: var(--accent);
    }

    /* Selected state: cell is inside the current selection rectangle */
    .cell.selected {
      background: var(--select-tint);
    }

    /* ── Palette strip ────────────────────────────────────────────────────── */
    /* Entries are created by Rust (build_palette); click handlers by Rust.   */
    #palette {
      background: var(--chrome);
      border-top: 1px solid var(--border);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 4px;
      flex-shrink: 0;
      user-select: none;
      overflow-x: auto;
    }
    .palette-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-right: 4px;
      white-space: nowrap;
    }

    /* Individual palette character button */
    .pal-char {
      width: 30px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 16px;
      background: var(--canvas-bg);
      color: var(--canvas-fg);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .pal-char:hover  { border-color: var(--text-dim); }
    .pal-char.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }
    /* Disabled: no background image loaded yet — dimmed and non-interactive. */
    .pal-char.disabled {
      opacity: 0.35;
      pointer-events: none;
      cursor: default;
    }

    /* Visual separator between palette groups */
    .pal-sep {
      width: 1px;
      height: 34px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* ── Mobile keyboard capture ─────────────────────────────────────────────── */
    /* Focused by Rust when the text tool is active; keyboard input is routed    */
    /* through input events back to type_char(). NOT display:none — that would   */
    /* prevent the element receiving focus and raising the keyboard on mobile.   */
    #text-input {
      position: fixed;
      left: -9999px;
      top: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      border: none;
      outline: none;
      padding: 0;
      pointer-events: none; /* ignores pointer/touch; keyboard events still work */
    }

    /* ── Text cursor ──────────────────────────────────────────────────────────── */
    /* Applied by Rust to the cell holding the text cursor glyph (▄ U+2584).     */
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .cell.cursor {
      animation: cursor-blink 1s step-end infinite;
    }

    /* ── Help mode ────────────────────────────────────────────────────────────── */

    /* ? button — position:relative + z-index:101 places it above the overlay     */
    /* so it remains tappable while help mode is active, allowing the user to exit. */
    #btn-help {
      position: relative;
      z-index: 101;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      font-weight: bold;
      line-height: 1.6;
    }
    #btn-help:hover { background: var(--border); }
    #btn-help.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* Full-screen transparent overlay that intercepts all pointer events while    */
    /* help mode is active. Rust briefly sets pointer-events:none before calling   */
    /* elementFromPoint so the element underneath is discoverable, then restores.  */
    /* rgba(0,0,0,0.001): nearly-invisible background ensures reliable hit-testing */
    /* across browsers (fully transparent may skip events in some engines).        */
    #help-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      cursor: help;
      background: rgba(0, 0, 0, 0.001);
      touch-action: none;
    }

    /* Floating balloon in the top-left of the canvas area.                      */
    /* top/left approximate: menubar height (~36px) + gap, toolbar (56px) +      */
    /* canvas padding (16px). Known approximation — revisit if layout changes.   */
    #help-popup {
      display: none;
      position: fixed;
      top: 44px;
      left: 80px;
      z-index: 102;
      max-width: 300px;
      background: var(--chrome);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      padding: 8px 12px;
      user-select: none;
    }
    /* Key name — accented monospace chip above the help text */
    #help-popup-key {
      display: block;
      font-family: monospace;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 3px;
    }
  </style>
</head>
<body>

  <!-- Menu bar — static labels; TBD: menus wired by Rust -->
  <div id="menubar">
    <span class="brand">charpaint</span>
    <!-- Help mode toggle — leftmost after brand so it's reachable on small screens.
         position:relative + z-index:101 (in CSS) keeps it above the help overlay. -->
    <button id="btn-help" title="Help — tap any control to see what it does">?</button>
    <span class="menu-sep"></span>
    <!-- Undo / redo — click handlers and Ctrl+Z/Shift+Ctrl+Z wired by Rust -->
    <button id="btn-undo"  class="menu-action" title="Undo (Ctrl+Z)"              data-help="undo">↩</button>
    <button id="btn-redo"  class="menu-action" title="Redo (Shift+Ctrl+Z)"         data-help="redo">↪</button>
    <button id="btn-copy"  class="menu-action" title="Copy canvas to clipboard"    data-help="copy">⧉</button>
    <button id="btn-clear" class="menu-action" title="Clear canvas (or selection)" data-help="clear">⌧</button>
    <span class="menu-sep"></span>
    <span class="menu-item">Goodies</span>
    <span class="spacer"></span>
    <!-- Initial label "☀ Light" reflects current dark default; Rust toggles it -->
    <button id="theme-toggle" data-help="theme">☀ Light</button>
  </div>

  <div id="main">

    <!-- Toolbar — icons and data-tool attrs defined here; click handlers wired by Rust -->
    <div id="toolbar">
      <!-- Blend mode tile: shows current mode icon; mousedown+drag opens the fly-out (wired by Rust) -->
      <!-- #mode-dropdown is appended here by build_blend_mode_control() -->
      <div class="tool-row">
        <div class="tool" id="mode-btn"     title="Blend mode: Overwrite"  data-help="blend-mode">▊</div>
        <div class="tool" id="shift-toggle" title="Constrain axis (Shift)" data-help="shift-constrain">⇧</div>
      </div>
      <div class="tool-sep"></div>
      <div class="tool-row">
        <div class="tool active" data-tool="pencil" title="Pencil" data-help="pencil">✎</div>
        <div class="tool"        data-tool="select" title="Select" data-help="select">⬚</div>
      </div>
      <div class="tool-row">
        <div class="tool" id="fill-tool-btn" data-tool="fill" title="Fill (4-adjacent) — tap again to cycle mode" data-help="fill">✣</div>
        <div class="tool" data-tool="text"   title="Text" data-help="text">A</div>
      </div>
      <div class="tool-sep"></div>
      <div class="tool-row">
        <div class="tool" id="line-tool-btn" data-tool="line"   title="Line — tap again to cycle mode" data-help="line">╲</div>
        <div class="tool"                    data-tool="eraser" title="Eraser"                         data-help="eraser">□</div>
      </div>
      <div class="tool-row">
        <div class="tool" data-tool="rect"      title="Rectangle"        data-help="rect">▭</div>
        <div class="tool" data-tool="rect-fill" title="Filled Rectangle" data-help="rect-fill">▬</div>
      </div>
      <div class="tool-row">
        <div class="tool" data-tool="oval"      title="Oval"        data-help="oval">○</div>
        <div class="tool" data-tool="oval-fill" title="Filled Oval" data-help="oval-fill">●</div>
      </div>
      <div class="tool-sep"></div>
      <!-- Image processing tools — operate on the dropped background image -->
      <div class="tool-row">
        <!-- Eye toggle: highlighted = background visible, un-highlighted = hidden.
             Disabled until an image is dropped; resets to visible on each new drop. -->
        <div class="tool disabled" id="bg-visibility-btn"
             title="Show/hide background image"
             data-help="bg-visibility">👁</div>
        <!-- Cycles: Original (▒) → White on black (┼) → Black on white (╬) -->
        <div class="tool" id="outline-mode-btn"
             title="Background: Original — tap to cycle"
             data-help="outline-mode">▒</div>
      </div>
      <div class="tool-row">
        <!-- BgMove: drag to pan, scroll to zoom background image -->
        <div class="tool" id="bg-move-btn" data-tool="bg-move"
             title="Move/resize background — drag to pan, scroll wheel to zoom"
             data-help="bg-move">✥</div>
        <!-- Load image from file — triggers native file picker on click -->
        <div class="tool" id="load-image-btn"
             title="Load background image from file"
             data-help="load-image">🖼</div>
      </div>
    </div>

    <div id="canvas-wrap">
      <!-- Grid cells are created programmatically by Rust (build_grid) -->
      <div id="grid"></div>
      <!-- Build timestamp set by Rust at startup via env!("BUILD_TIMESTAMP") -->
      <div id="build-info"></div>
    </div>

  </div>

  <!-- Palette entries are created programmatically by Rust (build_palette) -->
  <!-- data-help="palette" on the container: find_help_key walks up to this when -->
  <!-- hovering any palette item, showing one shared help entry for the whole strip. -->
  <div id="palette" data-help="palette">
    <!-- AA brush mode toggle — disabled until a background image is dropped.
         🎨︎ uses the text-presentation selector (U+FE0E) to request a monochrome
         glyph; falls back to colour emoji on unsupporting platforms. -->
    <div id="aa-mode-btn" class="pal-char disabled"
         title="AA brush — paint characters matched to background image (drop an image first)"
         data-help="aa-mode">🎨︎</div>
    <div class="pal-sep"></div>
  </div>

  <!-- Hidden input: focused by Rust when the text tool is active to raise the
       mobile virtual keyboard. autocorrect/autocapitalize off to prevent the
       browser from rewriting characters before they reach the canvas. -->
  <input id="text-input" type="text"
         autocomplete="off" autocorrect="off"
         autocapitalize="off" spellcheck="false">

  <!-- Hidden file input: programmatically clicked by the load-image-btn toolbar
       button to open the native file picker. display:none is safe here because
       we trigger it via .click() within a user-gesture handler, not via focus. -->
  <input id="image-file-input" type="file" accept="image/*" style="display:none">

  <!-- Help mode overlay: full-screen transparent layer that captures pointer events.
       Rust briefly sets pointer-events:none before elementFromPoint so the element
       underneath is discoverable. Shown/hidden by wire_help. -->
  <div id="help-overlay"></div>

  <!-- Help mode popup: fixed panel at the bottom showing help for the targeted element.
       key span: accented label (e.g. "PENCIL"). text span: help body from the YAML. -->
  <div id="help-popup">
    <span id="help-popup-key"></span><span id="help-popup-text"></span>
  </div>

  <script type="module">
    // Minimal loader — all application logic is in the Rust/WASM module.
    import init from './pkg/charpaint.js';
    await init(); // triggers #[wasm_bindgen(start)] → App::start()
  </script>

</body>
</html>
