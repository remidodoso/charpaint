# charpaint help text — English
# Keys match data-help attributes in index.html.
# Seed: tooltips as they existed at first authoring — expand freely.

pencil: "Pencil — click and drag to draw with the current palette character."
eraser: "Eraser — click and drag to erase cells back to blank."
select: "Select — drag to mark a rectangular region. Selected content can be copied or cleared."
fill: "Fill — click a cell to flood-fill all connected cells of the same character. Tap the button again to switch between 4-adjacent (respects enclosed outlines) and 8-adjacent (fills through diagonal corners) mode."
text: "Text — click a cell to place the cursor, then type. Enter or switch tools to commit. Escape to cancel and restart the cursor at the session origin."
line: "Line — drag to draw a straight line. Tap the button again to switch between character-stamp and ASCII art (─ │ \\ /) modes."
rect: "Rectangle — drag to draw a hollow rectangle outline."
rect-fill: "Filled Rectangle — drag to draw a solid filled rectangle."
oval: "Oval — drag to draw an ellipse outline."
oval-fill: "Filled Oval — drag to draw a solid filled ellipse."
blend-mode: "Blend mode — cycles between Overwrite (replaces any cell) and Stamp (only paints into blank cells)."
shift-constrain: "Axis constraint — locks drawing to a strict horizontal or vertical line. On desktop, holding Shift does the same thing."
undo: "Undo — reverses the last action. Keyboard: Ctrl+Z."
redo: "Redo — re-applies the last undone action. Keyboard: Shift+Ctrl+Z."
copy: "Copy — copies the canvas as plain text to the clipboard. If a region is selected, copies only that region. Keyboard: Ctrl+C."
clear: "Clear — erases the canvas. If a region is selected, erases only that region. Always undoable."
theme: "Theme — switches between dark and light colour schemes."
palette: "Character palette — click to select the character that drawing tools will place on the canvas."
load-image: "Load image — opens the native file browser (or photo library on mobile) to select a background image. Works the same as dragging an image onto the canvas."
bg-move: "Background move/resize — drag to pan the image, scroll wheel to zoom (pivot at cursor). Zoom range: half fit-to-canvas to 2× natural size. Positioning carries over between images. Mobile pinch/zoom coming later."
bg-visibility: "Background visibility — toggles the dropped background image on (highlighted, eye open) or off (un-highlighted, eye closed). Image data is always preserved; the AA brush works regardless of visibility state. Resets to visible whenever a new image is dropped."
outline-mode: "Background outline — cycles the dropped image between: Original (grayscale), White on black (bright edges on dark field), and Black on white (dark edges on light field). Edge scale is set to one character cell so structural features are highlighted at AA-conversion granularity."
aa-charset: "AA charset — cycles the character set the AA brush draws from. ASCII (a): printable ASCII 32–126. Braille (⠵): Unicode braille U+2800–U+28FF, 6-dot and 8-dot patterns combined. Dimmed while AA mode is off."
aa-mode: "AA brush — when active, every drawing tool places the printable ASCII character that best matches the background image region under the cursor, instead of the fixed palette character. Drop a background image first to enable. Works with all tools: pencil, line, shapes, and flood fill."
